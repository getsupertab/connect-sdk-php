# Fly.io config for the self-report demo site (see DEPLOY.md).
# Always-warm single machine: this is a probe target — it must never
# scale to zero or backend status probes would hit cold starts.

app = 'supertab-self-report-demo'
primary_region = 'fra'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/healthz'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
